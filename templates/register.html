<!DOCTYPE html>
<html>
<head>

<title>Register - SecureDesk</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="logo">
            SECUREDESK
        </div>

        <h1>Create Account</h1>

<form method="POST">

    <input type="text"
           name="name"
           placeholder="Full Name"
           required>

    <input type="email"
           name="email"
           placeholder="Email"
           required>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <select name="role">

        <option value="Employee">
            Employee
        </option>

        <option value="Admin">
            Admin
        </option>

    </select>

    <button type="submit"
            class="btn btn-primary">

        Create Account

    </button>

</form>
        <p class="bottom-text">
            Already have an account?

            <a href="/login">
                Login
            </a>
        </p>

    </div>

</div>
<footer class="footer">

    <h2>SecureDesk</h2>

    <p>Smart IT Service Management Platform</p>

    <p>📧 support@securedesk.com</p>

    <p>📞 +91 9876543210</p>

    <p>© 2026 SecureDesk IT Solutions. All Rights Reserved.</p>

</footer>

</body>
</html>
